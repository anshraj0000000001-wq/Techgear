<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Real-time Object Detection</title>
    <!-- TensorFlow.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <!-- COCO-SSD Model CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Modern Glassmorphism Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #1e293b 0%, #0f172a 100%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Main Viewport Container */
        .viewport-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            max-height: 70vh;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
        }

        /* UI Overlays */
        .overlay-stats {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .stat-badge {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-badge span {
            color: var(--primary);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 14px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #0f172a;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 242, 254, 0.4);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(239, 68, 68, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading Spinner */
        #loader {
            position: absolute;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 20px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast notifications */
        #status-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
            opacity: 0;
            transition: opacity 0.3s;
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.8rem; }
            .viewport-wrapper { aspect-ratio: 3/4; }
            .controls { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>AI VISION PRO</h1>
            <p class="subtitle">Neural Object Detection Pipeline</p>
        </header>

        <div class="viewport-wrapper">
            <!-- Loading State -->
            <div id="loader">
                <div class="spinner"></div>
                <p id="loader-text">Warming up Neural Network...</p>
            </div>

            <div class="overlay-stats">
                <div class="stat-badge">FPS: <span id="fps-val">0</span></div>
                <div class="stat-badge">Objects: <span id="obj-count">0</span></div>
            </div>

            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn btn-primary" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                Start Camera
            </button>
            <button id="stop-btn" class="btn btn-danger" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                Stop Camera
            </button>
        </div>
    </div>

    <div id="status-msg"></div>

    <script>
        /**
         * AI VISION APPLICATION LOGIC
         */
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loader = document.getElementById('loader');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const fpsVal = document.getElementById('fps-val');
        const objCount = document.getElementById('obj-count');
        const statusMsg = document.getElementById('status-msg');

        let model = null;
        let isRunning = false;
        let lastTimestamp = 0;
        let animationFrameId = null;

        /**
         * Initialization: Load AI Model
         */
        async function init() {
            try {
                // Set TensorFlow to use WebGL backend for hardware acceleration
                await tf.setBackend('webgl');
                await tf.ready();
                
                showStatus("Loading COCO-SSD Model...");
                model = await cocoSsd.load({ base: 'mobilenet_v2' });
                
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
                
                startBtn.disabled = false;
                showStatus("AI Model Ready", 2000);
            } catch (err) {
                console.error(err);
                document.getElementById('loader-text').innerText = "Hardware acceleration failed. Check your browser settings.";
            }
        }

        /**
         * Start Video Stream
         */
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    // Match canvas dimensions to video
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    isRunning = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    
                    predictLoop();
                };
            } catch (err) {
                showStatus("Camera access denied.");
                console.error(err);
            }
        }

        /**
         * Stop Video Stream
         */
        function stopCamera() {
            isRunning = false;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            
            const stream = video.srcObject;
            if (stream) {
                const tracks = stream.getTracks();
                tracks.forEach(track => track.stop());
            }
            video.srcObject = null;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            fpsVal.innerText = '0';
            objCount.innerText = '0';
        }

        /**
         * Detection Loop
         */
        async function predictLoop() {
            if (!isRunning) return;

            // Calculate FPS
            const now = performance.now();
            const delta = now - lastTimestamp;
            lastTimestamp = now;
            fpsVal.innerText = Math.round(1000 / delta);

            // Execute AI Prediction
            // tf.tidy ensures memory is cleaned up after every frame
            const predictions = await model.detect(video);
            
            renderPredictions(predictions);

            animationFrameId = requestAnimationFrame(predictLoop);
        }

        /**
         * Draw Bounding Boxes and Labels
         */
        function renderPredictions(predictions) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            objCount.innerText = predictions.length;

            predictions.forEach(prediction => {
                const [x, y, width, height] = prediction.bbox;
                
                // Draw Box
                ctx.strokeStyle = '#00f2fe';
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, width, height);

                // Draw Box Shadow Effect
                ctx.strokeStyle = 'rgba(0, 242, 254, 0.3)';
                ctx.lineWidth = 8;
                ctx.strokeRect(x, y, width, height);

                // Draw Label Background
                const text = `${prediction.class} ${(prediction.score * 100).toFixed(0)}%`;
                ctx.font = 'bold 16px Arial';
                const textWidth = ctx.measureText(text).width;
                
                ctx.fillStyle = '#00f2fe';
                ctx.fillRect(x, y - 25, textWidth + 10, 25);

                // Draw Text
                ctx.fillStyle = '#0f172a';
                ctx.fillText(text, x + 5, y - 7);
            });
        }

        /**
         * Helper: UI Status messages
         */
        function showStatus(msg, duration = 3000) {
            statusMsg.innerText = msg;
            statusMsg.style.opacity = '1';
            if (duration) {
                setTimeout(() => statusMsg.style.opacity = '0', duration);
            }
        }

        // Event Listeners
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);

        // Run Init
        window.onload = init;
    </script>
</body>
</html>
