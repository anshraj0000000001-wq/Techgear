<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Admin Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; margin:0; padding:0;}
header { background: #1e1e2f; color: white; padding: 1rem; text-align:center;}
section { padding: 1rem; max-width: 800px; margin: auto; background: white; margin-top: 1rem; border-radius: 8px;}
label { display:block; margin: 0.5rem 0 0.2rem;}
select, input, textarea, button { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border-radius: 4px; border:1px solid #ccc;}
button { background:#1e1e2f; color:white; cursor:pointer;}
button:hover { background:#333;}
ul { list-style:none; padding:0; max-height:200px; overflow:auto; border:1px solid #ccc; border-radius:4px; }
li { padding:0.5rem; border-bottom:1px solid #eee; }
.notification { background:#e3f2fd; padding:0.5rem; margin-bottom:0.5rem; border-radius:4px;}
</style>
</head>
<body>

<header>
<h1>Notification Admin Dashboard</h1>
</header>

<section>
<h2>Connected Users</h2>
<ul id="users-list">
<li>Loading...</li>
</ul>
</section>

<section>
<h2>Send Notification</h2>
<label for="user-select">Select User or All</label>
<select id="user-select">
<option value="ALL">-- All Users --</option>
</select>

<label for="message-input">Message</label>
<textarea id="message-input" rows="3" placeholder="Type your message..."></textarea>

<button id="send-btn">Send</button>
<p id="status-msg"></p>
</section>

<section>
<h2>Incoming Notifications</h2>
<div id="incoming"></div>
</section>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
/* ------------------------ */
/* Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyD-rcdGnoGOc0XFvWyRaNQzJQl01DOGZGs",
  authDomain: "techgear-fa27d.firebaseapp.com",
  projectId: "techgear-fa27d",
  storageBucket: "techgear-fa27d.firebasestorage.app",
  messagingSenderId: "389961280322",
  appId: "1:389961280322:web:77d9064c1079355cec36db",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ------------------------ */
/* Backend URL */
const backendUrl = "https://web-production-e681c.up.railway.app";

/* ------------------------ */
/* Global Variables */
let ws;
let currentUserToken = "";
let connectedUsers = [];

/* ------------------------ */
/* Firebase Anonymous Login */
auth.signInAnonymously()
.then(userCredential => {
    currentUserToken = userCredential.user ? userCredential.user.za : "";
    initWebSocket();
    fetchConnectedUsers();
})
.catch(console.error);

/* ------------------------ */
/* Fetch Connected Users */
async function fetchConnectedUsers() {
    try {
        const res = await fetch(`${backendUrl}/connected-users`);
        const data = await res.json();
        connectedUsers = data.users || [];
        updateUserSelect();
    } catch(e) { console.error(e); }
}

function updateUserSelect() {
    const select = document.getElementById("user-select");
    select.innerHTML = `<option value="ALL">-- All Users --</option>`;
    connectedUsers.forEach(uid => {
        select.innerHTML += `<option value="${uid}">${uid}</option>`;
    });
    const ul = document.getElementById("users-list");
    ul.innerHTML = "";
    connectedUsers.forEach(uid => {
        const li = document.createElement("li");
        li.textContent = uid;
        ul.appendChild(li);
    });
}

/* ------------------------ */
/* WebSocket */
function initWebSocket() {
    ws = new WebSocket(`${backendUrl.replace(/^http/, 'ws')}/ws?token=${currentUserToken}`);
    ws.onopen = () => console.log("WebSocket connected");
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const div = document.getElementById("incoming");
        const p = document.createElement("div");
        p.className = "notification";
        p.textContent = `From: ${data.user_id || "server"} | Message: ${data.message}`;
        div.prepend(p);
    };
    ws.onclose = () => setTimeout(initWebSocket, 3000); // auto reconnect
}

/* ------------------------ */
/* Send Notification */
document.getElementById("send-btn").addEventListener("click", async () => {
    const user_id = document.getElementById("user-select").value;
    const message = document.getElementById("message-input").value.trim();
    if (!message) return alert("Message cannot be empty");

    const payload = {user_id, message};
    try {
        const res = await fetch(`${backendUrl}/notify`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        document.getElementById("status-msg").textContent = data.status === "sent" || data.status === "broadcast_sent" ? "Message sent!" : JSON.stringify(data);
        document.getElementById("message-input").value = "";
        fetchConnectedUsers(); // Refresh users list
    } catch(e) { console.error(e); }
});
</script>

</body>
</html>
