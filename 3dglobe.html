<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Earth & Moon - Created by Ansh Raj</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        .glass {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #loader { transition: opacity 1s ease-in-out; }
        .ansh-credit {
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        /* Mobile optimize for height */
        @supports (-webkit-touch-callout: none) {
            .h-screen { height: -webkit-fill-available; }
        }
    </style>
</head>
<body class="text-white font-sans">

    <!-- Loading & Launch Screen -->
    <div id="loader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black p-6">
        <div id="loading-assets" class="flex flex-col items-center">
            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
                <div class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <div class="text-center">
                <h2 id="loading-text" class="text-blue-400 font-mono text-sm tracking-[0.4em] uppercase mb-2">Syncing Planet Data...</h2>
                <div class="ansh-credit text-2xl tracking-widest mb-4 uppercase">MADE BY ANSH RAJ</div>
                <div class="w-64 h-1 bg-white/5 rounded-full overflow-hidden mb-2">
                    <div id="progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-300 shadow-[0_0_10px_rgba(59,130,246,0.8)]"></div>
                </div>
                <p class="text-gray-500 text-[10px] tracking-widest uppercase">Bihar Node Connectivity: Pending</p>
            </div>
        </div>

        <!-- Launch Button (Hidden until loaded) -->
        <button id="launch-btn" class="hidden glass px-12 py-4 rounded-full border border-blue-500/50 text-blue-400 font-bold tracking-[0.3em] hover:bg-blue-600 hover:text-white transition-all transform active:scale-95 shadow-[0_0_30px_rgba(59,130,246,0.3)]">
            GO FULLSCREEN
        </button>
    </div>

    <!-- UI Overlay -->
    <header class="fixed top-0 left-0 w-full p-4 z-10 flex justify-between items-center pointer-events-none">
        <div class="pointer-events-auto flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/50">
                <svg viewBox="0 0 24 24" class="w-5 h-5 fill-white"><path d="M12,2C6.48,2,2,6.48,2,12s4.48,10,10,10s10-4.48,10-10S17.52,2,12,2z M11,19.93C7.05,19.44,4,16.08,4,12 c0-0.35,0.02-0.69,0.07-1.03L9,15.93V17c0,1.1,0.9,2,2,2V19.93z M17.9,17.39C17.64,16.58,16.9,16,16,16h-1v-3c0-0.55-0.45-1-1-1h-6v-2 h2c0.55,0,1-0.45,1-1V7h2c1.1,0,2-0.9,2-2v-0.41C17.95,5.51,20,8.51,20,12C20,14.13,19.2,16.07,17.9,17.39z"/></svg>
            </div>
            <div>
                <h1 class="font-bold text-sm tracking-tight uppercase">ANSH<span class="text-blue-500">DEVLOPER</span></h1>
                <p class="text-[8px] text-gray-500 uppercase tracking-widest">Operator: Ansh Raj</p>
            </div>
        </div>
    </header>

    <aside class="fixed left-4 bottom-6 z-10 pointer-events-none">
        <div class="glass p-4 rounded-xl pointer-events-auto border-b-2 border-b-blue-500">
            <h4 class="text-[9px] text-blue-400 font-bold mb-1 uppercase tracking-widest">Active Scan</h4>
            <div class="space-y-0 text-xs font-mono">
                <div class="text-white font-bold text-[11px]">BIHAR, INDIA</div>
                <div class="text-[9px] text-gray-500">LAT: 25.0961° N</div>
                <div class="text-[9px] text-gray-500">LON: 85.3131° E</div>
            </div>
        </div>
    </aside>

    <div id="canvas-container" class="absolute inset-0"></div>

    <script>
        let scene, camera, renderer, controls, earth, clouds, moon, starField, biharMarker;

        const textures = {
            earth: 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg',
            bump: 'https://unpkg.com/three-globe/example/img/earth-topology.png',
            specular: 'https://unpkg.com/three-globe/example/img/earth-water-mask.png',
            clouds: 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_clouds_2048.png',
            moon: 'https://unpkg.com/three-globe/example/img/moon.jpg',
            moonBump: 'https://unpkg.com/three-globe/example/img/moon-topology.png'
        };

        const manager = new THREE.LoadingManager();
        manager.onProgress = (url, itemsLoaded, itemsTotal) => {
            const progress = (itemsLoaded / itemsTotal) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        };

        manager.onLoad = () => {
            document.getElementById('loading-assets').classList.add('hidden');
            document.getElementById('launch-btn').classList.remove('hidden');
        };

        // Fullscreen Logic
        document.getElementById('launch-btn').addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) { /* Safari */
                document.documentElement.webkitRequestFullscreen();
            }
            
            const loaderDiv = document.getElementById('loader');
            loaderDiv.style.opacity = '0';
            setTimeout(() => loaderDiv.remove(), 1000);
        });

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2, 1.5, 4);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.outputEncoding = THREE.sRGBEncoding;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader(manager);

            // 1. Earth Setup
            const earthGeo = new THREE.SphereGeometry(1, 64, 64);
            const earthMat = new THREE.MeshPhongMaterial({
                map: loader.load(textures.earth),
                bumpMap: loader.load(textures.bump),
                bumpScale: 0.02,
                specularMap: loader.load(textures.specular),
                specular: new THREE.Color(0x222222),
                shininess: 25
            });
            earth = new THREE.Mesh(earthGeo, earthMat);
            scene.add(earth);

            // 2. Cloud Layer
            const cloudGeo = new THREE.SphereGeometry(1.02, 64, 64);
            const cloudMat = new THREE.MeshPhongMaterial({
                map: loader.load(textures.clouds),
                transparent: true,
                opacity: 0.4
            });
            clouds = new THREE.Mesh(cloudGeo, cloudMat);
            scene.add(clouds);

            // 3. Moon Setup
            const moonGeo = new THREE.SphereGeometry(0.27, 32, 32);
            const moonMat = new THREE.MeshPhongMaterial({
                map: loader.load(textures.moon),
                bumpMap: loader.load(textures.moonBump),
                bumpScale: 0.005,
                shininess: 5
            });
            moon = new THREE.Mesh(moonGeo, moonMat);
            scene.add(moon);

            // 4. Atmosphere Glow
            const atmosGeo = new THREE.SphereGeometry(1.2, 64, 64);
            const atmosMat = new THREE.ShaderMaterial({
                transparent: true,
                side: THREE.BackSide,
                uniforms: {
                    glowColor: { value: new THREE.Color(0x3b82f6) },
                    viewVector: { value: camera.position }
                },
                vertexShader: `
                    uniform vec3 viewVector;
                    varying float intensity;
                    void main() {
                        vec3 vNormal = normalize( normalMatrix * normal );
                        vec3 vNormel = normalize( normalMatrix * viewVector );
                        intensity = pow( 0.6 - dot(vNormal, vNormel), 4.5 );
                        gl_Position = projectionMatrix * modelViewMatrix * vec4( position, 1.0 );
                    }
                `,
                fragmentShader: `
                    varying float intensity;
                    uniform vec3 glowColor;
                    void main() {
                        vec3 glow = glowColor * intensity;
                        gl_FragColor = vec4( glow, intensity );
                    }
                `
            });
            scene.add(new THREE.Mesh(atmosGeo, atmosMat));

            // 5. Bihar Marker
            function latLonToVector3(lat, lon, radius) {
                const phi = (90 - lat) * (Math.PI / 180);
                const theta = (lon + 180) * (Math.PI / 180);
                return new THREE.Vector3(
                    -(radius * Math.sin(phi) * Math.cos(theta)),
                    radius * Math.cos(phi),
                    radius * Math.sin(phi) * Math.sin(theta)
                );
            }

            const biharPos = latLonToVector3(25.0961, 85.3131, 1.01);
            const markerGeo = new THREE.SphereGeometry(0.012, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0xff3300 });
            biharMarker = new THREE.Mesh(markerGeo, markerMat);
            biharMarker.position.copy(biharPos);
            
            const ringGeo = new THREE.RingGeometry(0.02, 0.025, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff3300, side: THREE.DoubleSide, transparent: true });
            const pulseRing = new THREE.Mesh(ringGeo, ringMat);
            pulseRing.lookAt(biharPos.clone().multiplyScalar(2));
            biharMarker.add(pulseRing);
            earth.add(biharMarker);

            // 6. Space Background
            const starsGeo = new THREE.BufferGeometry();
            const starsCount = 4000;
            const posArray = new Float32Array(starsCount * 3);
            for(let i=0; i < starsCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 100;
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            starField = new THREE.Points(starsGeo, new THREE.PointsMaterial({ size: 0.03, color: 0xffffff, transparent: true, opacity: 0.8 }));
            scene.add(starField);

            // 7. Lighting
            const sun = new THREE.DirectionalLight(0xffffff, 1.8);
            sun.position.set(5, 3, 5);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.25));

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;
            controls.minDistance = 1.6;
            controls.maxDistance = 12;

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let moonAngle = 0;
        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0008;
            clouds.rotation.y += 0.001;
            starField.rotation.y += 0.00003;

            moonAngle += 0.0025;
            moon.position.x = Math.cos(moonAngle) * 6;
            moon.position.z = Math.sin(moonAngle) * 6;
            moon.rotation.y += 0.005;

            if(biharMarker && biharMarker.children[0]) {
                const ring = biharMarker.children[0];
                const scale = 1 + Math.sin(Date.now() * 0.008) * 0.6;
                ring.scale.set(scale, scale, 1);
                ring.material.opacity = 1 - (scale - 1) / 0.6;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
